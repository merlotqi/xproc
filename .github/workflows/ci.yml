name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node/package-lock.json
      - name: Install Node binding deps
        working-directory: node
        run: npm ci
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXPROC_BUILD_TESTS=ON -DXPROC_BUILD_EXAMPLES=ON -DXPROC_BUILD_NODE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Phase 1 Regression Suite
        run: cmake --build build --target xproc_run_phase1_tests
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node/package-lock.json
      - name: Install Node binding deps
        working-directory: node
        run: npm ci
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXPROC_BUILD_TESTS=ON -DXPROC_BUILD_EXAMPLES=ON -DXPROC_BUILD_NODE=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Phase 1 Regression Suite
        run: cmake --build build --config Release --target xproc_run_phase1_tests
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
