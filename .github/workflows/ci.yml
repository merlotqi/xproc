name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXPROC_BUILD_TESTS=ON -DXPROC_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build --parallel
      - name: API Coverage Checklist Gate
        run: |
          test -f tests/API_COVERAGE.md
          if grep -q "\[ \]" tests/API_COVERAGE.md; then
            echo "API coverage checklist has unchecked entries"
            exit 1
          fi
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DXPROC_BUILD_TESTS=ON -DXPROC_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: API Coverage Checklist Gate
        shell: bash
        run: |
          test -f tests/API_COVERAGE.md
          if grep -q "\[ \]" tests/API_COVERAGE.md; then
            echo "API coverage checklist has unchecked entries"
            exit 1
          fi
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
