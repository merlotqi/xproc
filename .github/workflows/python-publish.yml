name: Python Package Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Publish target
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "python-v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: auto64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_TEST_COMMAND: >-
            python {project}/tests/python_wheel_smoke.py
            --expected-wheel {wheel}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-publish-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - name: Validate sdist install
        run: |
          python -m venv .venv-sdist-smoke
          . .venv-sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
          python tests/python_wheel_smoke.py

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-publish-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/xproc-bindings/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-publish-*
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -l dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/python-v') || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/xproc-bindings/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-publish-*
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -l dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
